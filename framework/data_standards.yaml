# ============================================================
# GIS Data Standards — ISO 19115 Metadata Schema
# Humanitarian GIS Governance Framework
# Version: 1.0
# ============================================================

metadata:
  title: "Humanitarian GIS Metadata Standards"
  standard: "ISO 19115:2014 Geographic Information — Metadata"
  supplementary: ["INSPIRE Directive", "OCHA HDX Metadata Schema", "Dublin Core"]
  version: "1.0"

# ── MANDATORY METADATA FIELDS ────────────────────────────────
# Every dataset in the catalogue MUST have these fields
mandatory_fields:

  identification:
    - field: "title"
      type: string
      description: "Official name of the dataset"
      example: "RCA Administrative Boundaries — Level 3"

    - field: "abstract"
      type: string
      max_length: 500
      description: "Plain-language description of dataset content, purpose, and context"

    - field: "dataset_id"
      type: string
      format: "{DOMAIN_CODE}-{YYYY}-{SEQ}"
      example: "DD01-2026-0042"
      description: "Unique identifier following governance naming convention"

    - field: "domain"
      type: enum
      values: ["DD01", "DD02", "DD03", "DD04", "DD05"]
      description: "Data domain as defined in governance_policy.yaml"

    - field: "classification"
      type: enum
      values: ["Public", "Restricted", "Confidential", "Sensitive"]
      description: "Access classification level"

    - field: "language"
      type: string
      format: "ISO 639-1"
      example: "fr"

  temporal:
    - field: "date_created"
      type: date
      format: "ISO 8601 (YYYY-MM-DD)"

    - field: "date_last_modified"
      type: date
      format: "ISO 8601 (YYYY-MM-DD)"

    - field: "temporal_extent_start"
      type: date
      description: "Start of the time period covered by the data"

    - field: "temporal_extent_end"
      type: date
      description: "End of the time period. Use 'present' for ongoing datasets."

    - field: "update_frequency"
      type: enum
      values: ["real-time", "daily", "weekly", "monthly", "quarterly", "annual", "irregular", "as-needed"]

  spatial:
    - field: "coordinate_reference_system"
      type: string
      format: "EPSG code"
      example: "EPSG:4326"
      description: "Coordinate Reference System. Default: WGS84 (EPSG:4326)."

    - field: "bounding_box"
      type: object
      fields: ["west_lon", "east_lon", "south_lat", "north_lat"]
      example: { west_lon: 14.42, east_lon: 27.46, south_lat: 2.22, north_lat: 11.00 }
      description: "Approximate geographic extent (WGS84 decimal degrees)"

    - field: "geometry_type"
      type: enum
      values: ["Point", "LineString", "Polygon", "MultiPoint", "MultiPolygon", "Raster", "Mixed"]

    - field: "spatial_resolution"
      type: string
      example: "1:100,000 or 30m"
      description: "Scale denominator for vector data; pixel size for raster"

  provenance:
    - field: "source_organization"
      type: string
      example: "OCHA, OSM, GADM, field survey"

    - field: "source_url"
      type: string
      format: "URI"

    - field: "lineage_description"
      type: string
      description: "Brief description of how data was derived, processed, or transformed"

    - field: "data_steward"
      type: string
      description: "Name/ID of the assigned Data Steward (see stewardship_register.yaml)"

  distribution:
    - field: "format"
      type: enum
      values: ["Shapefile", "GeoJSON", "GeoPackage", "GeoTIFF", "PostGIS table", "WMS", "WFS", "CSV+coords"]

    - field: "access_url"
      type: string
      description: "URL or internal path to access the dataset"

    - field: "licence"
      type: string
      example: "CC BY 4.0, ODbL, Proprietary, Internal use only"

# ── OPTIONAL ENRICHMENT FIELDS ───────────────────────────────
optional_fields:
  - field: "keywords"
    type: list
    example: ["boundaries", "admin", "CAR", "OCHA COD"]

  - field: "topic_category"
    type: enum
    values: ["boundaries", "health", "logistics", "security", "population", "environment", "infrastructure"]

  - field: "related_datasets"
    type: list
    description: "Dataset IDs of upstream or downstream related datasets"

  - field: "known_issues"
    type: string
    description: "Documented limitations, gaps, or known quality issues"

  - field: "processing_scripts"
    type: string
    description: "URL or path to ETL/processing scripts used (for lineage)"

# ── FILE NAMING CONVENTION ────────────────────────────────────
naming_convention:
  format: "{DOMAIN}_{COUNTRY_ISO3}_{THEME}_{SCALE}_{YYYY}_{VERSION}"
  examples:
    - "DD01_CAF_admin_boundaries_lvl3_2026_v02.gpkg"
    - "DD02_MRT_intervention_zones_2025_v01.geojson"
    - "DD03_SEN_health_facilities_2026_v03.gpkg"
  rules:
    - "All lowercase except domain code"
    - "No spaces — use underscores"
    - "Version: v01, v02 ... v99"
    - "Country ISO 3166-1 alpha-3 code"
    - "Theme: descriptive 1-3 word slug"

# ── QUALITY DIMENSIONS ────────────────────────────────────────
quality_dimensions:
  - dimension: "Completeness"
    definition: "Absence of missing values or features"
    target: "> 95% for mandatory fields"
    check_type: "automated"

  - dimension: "Consistency"
    definition: "Absence of contradictions within and across datasets"
    target: "Zero topological errors in polygon layers"
    check_type: "automated"

  - dimension: "Accuracy"
    definition: "Closeness of data values to the true/real world values"
    target: "Positional accuracy documented; source accuracy inherited"
    check_type: "manual validation"

  - dimension: "Timeliness"
    definition: "Data reflects the state of the world at the required time"
    target: "Update frequency met per domain policy"
    check_type: "automated monitoring"

  - dimension: "Validity"
    definition: "Data conforms to defined format and schema"
    target: "100% schema compliance before promotion to production"
    check_type: "automated"

  - dimension: "Uniqueness"
    definition: "Absence of duplicate records or features"
    target: "Zero duplicate geometry+attribute combinations"
    check_type: "automated"
