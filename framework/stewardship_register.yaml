# ============================================================
# GIS Data Stewardship Register
# Aligned with DAMA-DMBOK v2 — Chapter 3: Data Governance
# Version: 1.0 | Last updated: 2026-04
# ============================================================

metadata:
  title: "GIS Data Stewardship Register"
  version: "1.0"
  owner: "Data Governance Specialist"
  last_reviewed: "2026-04"
  next_review: "2027-04"

# ── STEWARDSHIP ROLE DEFINITIONS ────────────────────────────
role_definitions:
  - role: "Data Owner"
    level: "Strategic"
    dama_reference: "DMBOK2 Ch.3 §3.2"
    responsibilities:
      - "Accountable for data domain business outcomes"
      - "Approves data policies and classification decisions"
      - "Authorizes access to confidential/sensitive datasets"
      - "Signs off on data disposal decisions"

  - role: "Data Steward"
    level: "Operational"
    dama_reference: "DMBOK2 Ch.3 §3.3"
    responsibilities:
      - "Maintains metadata records for assigned domain"
      - "Monitors and acts on automated quality alerts"
      - "Documents lineage for all managed datasets"
      - "Coordinates with field teams for data acquisition standards"
      - "Participates in Data Stewardship Council meetings"

  - role: "Data Custodian"
    level: "Technical"
    dama_reference: "DMBOK2 Ch.3 §3.4"
    responsibilities:
      - "Manages physical storage and database infrastructure"
      - "Implements access controls per classification policy"
      - "Executes automated quality pipeline maintenance"
      - "Manages backups and disaster recovery"

  - role: "Data Consumer"
    level: "User"
    dama_reference: "DMBOK2 Ch.3 §3.5"
    responsibilities:
      - "Uses data according to its classification level"
      - "Reports quality issues to assigned Data Steward"
      - "Documents usage context in data catalogue"

# ── DOMAIN STEWARDSHIP ASSIGNMENTS ──────────────────────────
stewardship_assignments:
  - domain_id: "DD01"
    domain_name: "Reference Geospatial Data"
    data_owner:
      title: "GIS Centre Director"
      contact: "[director@gis-centre.org]"
    data_steward:
      title: "Senior GIS Analyst — Reference Data"
      contact: "[steward-ref@gis-centre.org]"
      backup: "[backup-steward-ref@gis-centre.org]"
    data_custodian:
      title: "GIS Database Administrator"
      contact: "[dba@gis-centre.org]"
    datasets_managed:
      - "OCHA Common Operational Datasets (CODs)"
      - "GADM Administrative Boundaries"
