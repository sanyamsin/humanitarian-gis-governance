# ── ONBOARDING CHECKLIST FOR NEW STEWARDS ───────────────────
steward_onboarding_checklist:
  - task: "Complete governance framework orientation (2h)"
  - task: "Read DAMA-DMBOK v2 Chapter 3 summary"
  - task: "Review assigned domain metadata records"
  - task: "Access granted to data catalogue and quality dashboard"
  - task: "Added to Data Stewardship Council mailing list"
  - task: "First stewardship council meeting attended"
  - task: "Backup steward identified and confirmed"
  - task: "Escalation path documented and tested"
